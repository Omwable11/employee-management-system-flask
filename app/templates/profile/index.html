{% extends "base.html" %} {% block title %}My Profile{% endblock %} {% block
content %}

<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3>My Profile</h3>
    </div>

    <div class="card-body">
      <table class="table">
        <tr>
          <th>Username</th>
          <td>{{ user.username }}</td>
        </tr>

        <a
          href="{{ url_for('profile.change_password') }}"
          class="btn btn-warning"
        >
          Change Password
        </a>

        <tr>
          <th>Email</th>
          <td>{{ user.email }}</td>
        </tr>

        <tr>
          <th>Role</th>
          <td>{{ user.role|capitalize }}</td>
        </tr>
      </table>
    </div>
  </div>
</div>

{% endblock %}
