<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Employee Management System{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">EMS</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('department.index') }}">
                Departments
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('auth.login') }}"> Login </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('auth.register') }}">
                Register
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('employee.index') }}">
                Employees
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('main.home') }}">
                Dashboard
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('leave.index') }}">
                Leave
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('attendance.index') }}">
                Attendance
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('profile.index') }}">
                My Profile
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">{% block content %} {% endblock %}</div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </body>
</html>
